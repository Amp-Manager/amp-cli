name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Changelog Section
        id: changelog_reader
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            const version = context.ref.replace('refs/tags/v', '');
            // This regex finds everything between your [1.11.3] header and the next ## header
            const regex = new RegExp(`## \\[${version}\\][\\s\\S]*?(?=\\n## |$)`);
            const match = changelog.match(regex);
            return match ? match[0] : "Release notes not found in CHANGELOG.md";
          result-encoding: string

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.changelog_reader.outputs.result }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
